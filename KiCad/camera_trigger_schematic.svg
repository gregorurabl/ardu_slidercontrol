<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 630" width="780" height="630" font-family="monospace" font-size="12">

  <rect width="780" height="630" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="390" y="28" fill="#e0e0e0" font-size="14" font-weight="bold" text-anchor="middle">Camera Trigger System - Slider Control V2.1</text>

  <!-- Arduino Mega Block -->
  <rect x="30" y="60" width="140" height="100" rx="6" fill="#0d3b66" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="100" y="82" fill="#e0e0e0" font-size="11" font-weight="bold" text-anchor="middle">Arduino Mega</text>
  <text x="100" y="100" fill="#a0c4ff" font-size="10" text-anchor="middle">2560</text>
  <text x="100" y="125" fill="#e0e0e0" font-size="10" text-anchor="middle">Digital Pin 47</text>
  <text x="100" y="142" fill="#a0c4ff" font-size="10" text-anchor="middle">TRIGGER_PIN</text>

  <!-- Pin 47 output line -->
  <line x1="170" y1="110" x2="230" y2="110" stroke="#f0c040" stroke-width="2"/>
  <text x="196" y="105" fill="#f0c040" font-size="10">Pin 47</text>

  <!-- 4N33 Optoisolator IC Box -->
  <rect x="230" y="55" width="200" height="210" rx="6" fill="#1a2a1a" stroke="#6abf69" stroke-width="1.5"/>
  <text x="330" y="75" fill="#6abf69" font-size="11" font-weight="bold" text-anchor="middle">4N33 Optoisolator</text>

  <!-- LED side (input) -->
  <!-- Anode Pin 1 -->
  <line x1="230" y1="110" x2="280" y2="110" stroke="#f0c040" stroke-width="2"/>
  <text x="245" y="105" fill="#9e9e9e" font-size="10">1</text>

  <!-- LED symbol -->
  <!-- Triangle (diode) -->
  <polygon points="280,97 280,123 305,110" fill="#f0c040" stroke="#f0c040" stroke-width="1"/>
  <line x1="305" y1="97" x2="305" y2="123" stroke="#f0c040" stroke-width="2"/>
  <!-- Arrow lines for light emission -->
  <line x1="310" y1="118" x2="322" y2="106" stroke="#ffff80" stroke-width="1.2"/>
  <line x1="316" y1="122" x2="328" y2="110" stroke="#ffff80" stroke-width="1.2"/>
  <polygon points="322,106 316,108 320,102" fill="#ffff80"/>
  <polygon points="328,110 322,112 326,106" fill="#ffff80"/>

  <!-- Kathode Pin 2 line down -->
  <line x1="280" y1="123" x2="280" y2="195" stroke="#f0c040" stroke-width="2"/>
  <text x="245" y="175" fill="#9e9e9e" font-size="10">2</text>
  <line x1="230" y1="195" x2="280" y2="195" stroke="#f0c040" stroke-width="2"/>

  <!-- R1 470 Ohm -->
  <!-- Resistor body -->
  <line x1="170" y1="195" x2="210" y2="195" stroke="#f0c040" stroke-width="2"/>
  <rect x="210" y="185" width="40" height="20" rx="3" fill="#2a2a0a" stroke="#f0c040" stroke-width="1.5"/>
  <text x="230" y="198" fill="#f0c040" font-size="10" text-anchor="middle">390Ω</text>
  <line x1="250" y1="195" x2="280" y2="195" stroke="#f0c040" stroke-width="2"/>
  <text x="195" y="213" fill="#9e9e9e" font-size="10">R1</text>

  <!-- GND from resistor -->
  <line x1="170" y1="195" x2="170" y2="240" stroke="#f0c040" stroke-width="2"/>
  <!-- GND symbol -->
  <line x1="150" y1="240" x2="190" y2="240" stroke="#f0c040" stroke-width="2"/>
  <line x1="157" y1="248" x2="183" y2="248" stroke="#f0c040" stroke-width="1.5"/>
  <line x1="164" y1="256" x2="176" y2="256" stroke="#f0c040" stroke-width="1.5"/>
  <text x="170" y="272" fill="#9e9e9e" font-size="10" text-anchor="middle">GND</text>

  <!-- Phototransistor side (output) -->
  <!-- Transistor symbol -->
  <!-- Base line (vertical) -->
  <line x1="355" y1="97" x2="355" y2="137" stroke="#6abf69" stroke-width="2"/>
  <!-- Collector line up -->
  <line x1="355" y1="97" x2="380" y2="97" stroke="#6abf69" stroke-width="2"/>
  <!-- Emitter line down -->
  <line x1="355" y1="137" x2="380" y2="137" stroke="#6abf69" stroke-width="2"/>
  <!-- Collector diagonal -->
  <line x1="355" y1="97" x2="370" y2="110" stroke="#6abf69" stroke-width="2"/>
  <!-- Emitter diagonal with arrow -->
  <line x1="355" y1="137" x2="370" y2="124" stroke="#6abf69" stroke-width="2"/>
  <polygon points="370,124 360,122 363,132" fill="#6abf69"/>
  <!-- Circle around transistor -->
  <circle cx="362" cy="117" r="22" fill="none" stroke="#6abf69" stroke-width="1.5"/>

  <!-- Collector Pin 5 - to right -->
  <line x1="380" y1="97" x2="430" y2="97" stroke="#6abf69" stroke-width="2"/>
  <text x="395" y="92" fill="#9e9e9e" font-size="10">5</text>

  <!-- Emitter Pin 4 - to right -->
  <line x1="380" y1="137" x2="430" y2="137" stroke="#6abf69" stroke-width="2"/>
  <text x="395" y="153" fill="#9e9e9e" font-size="10">4</text>

  <!-- Optoisolator border end -->

  <!-- Right side: Headphone Jack -->
  <rect x="530" y="60" width="200" height="110" rx="6" fill="#1a1a3a" stroke="#9c88ff" stroke-width="1.5"/>
  <text x="630" y="80" fill="#9c88ff" font-size="11" font-weight="bold" text-anchor="middle">3.5mm Jack (TRS)</text>

  <!-- Pin 5 Collector to Jack Tip (Ring / R) -->
  <line x1="430" y1="97" x2="530" y2="97" stroke="#6abf69" stroke-width="2"/>
  <text x="478" y="91" fill="#6abf69" font-size="10" text-anchor="middle">Trigger</text>
  <line x1="530" y1="97" x2="560" y2="97" stroke="#6abf69" stroke-width="2"/>
  <!-- Jack Tip symbol -->
  <circle cx="570" cy="97" r="5" fill="#9c88ff" stroke="#9c88ff"/>
  <text x="585" y="101" fill="#e0e0e0" font-size="11">Tip (R)</text>
  <text x="585" y="115" fill="#9c88ff" font-size="10">Camera Shutter</text>

  <!-- Pin 4 Emitter to Jack Sleeve -->
  <line x1="430" y1="137" x2="530" y2="137" stroke="#6abf69" stroke-width="2"/>
  <text x="478" y="131" fill="#9e9e9e" font-size="10" text-anchor="middle">GND</text>
  <line x1="530" y1="137" x2="560" y2="137" stroke="#6abf69" stroke-width="2"/>
  <circle cx="570" cy="137" r="5" fill="#9c88ff" stroke="#9c88ff"/>
  <text x="585" y="141" fill="#e0e0e0" font-size="11">Sleeve</text>
  <text x="585" y="155" fill="#9c88ff" font-size="10">Camera GND</text>

  <!-- Logic description box -->
  <rect x="30" y="300" width="720" height="95" rx="6" fill="#0d1117" stroke="#4a90d9" stroke-width="1"/>
  <text x="50" y="322" fill="#a0c4ff" font-size="11" font-weight="bold">Logic / Firmware (triggerCamera):</text>
  <text x="50" y="342" fill="#9e9e9e" font-size="11">Idle:     Pin 47 HIGH  -->  LED off  -->  Transistor open  -->  Shutter open (no trigger)</text>
  <text x="50" y="360" fill="#9e9e9e" font-size="11">Trigger:  Pin 47 LOW   -->  LED on   -->  Transistor closes -->  Shutter closed (trigger pulse)</text>
  <text x="50" y="378" fill="#9e9e9e" font-size="11">Pulse duration: camera_trigger_duration = 100ms    |    Detection: sonar.ping() == 0 at boot</text>

  <!-- Detection note -->
  <rect x="230" y="280" width="310" height="16" rx="3" fill="#1a2a1a" stroke="#6abf69" stroke-width="1"/>
  <text x="385" y="292" fill="#6abf69" font-size="10" text-anchor="middle">camera_attached = true if sonar ping returns 0 at boot</text>

  <!-- Cable Diagram Section -->
  <text x="390" y="420" fill="#e0e0e0" font-size="13" font-weight="bold" text-anchor="middle">Kabel: 3.5mm TRS (Buchse) --> Canon N3 (Stecker)</text>

  <!-- TRS Jack cross-section -->
  <rect x="50" y="435" width="160" height="145" rx="6" fill="#1a1a3a" stroke="#9c88ff" stroke-width="1.5"/>
  <text x="130" y="453" fill="#9c88ff" font-size="11" font-weight="bold" text-anchor="middle">3.5mm TRS Buchse</text>

  <!-- TRS visual - barrel shape -->
  <rect x="75" y="462" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>
  <rect x="75" y="490" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>
  <rect x="75" y="518" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>

  <text x="100" y="478" fill="#e0e0e0" font-size="11">Tip</text>
  <text x="100" y="506" fill="#e0e0e0" font-size="11">Ring</text>
  <text x="100" y="534" fill="#e0e0e0" font-size="11">Sleeve</text>

  <circle cx="160" cy="474" r="5" fill="#e05050"/>
  <circle cx="160" cy="502" r="5" fill="#e09020"/>
  <circle cx="160" cy="530" r="5" fill="#a0a0a0"/>

  <!-- Wire colors legend -->
  <text x="130" y="562" fill="#9e9e9e" font-size="9" text-anchor="middle">rot / orange / schwarz</text>

  <!-- Cable lines -->
  <!-- Tip wire -->
  <line x1="215" y1="474" x2="310" y2="474" stroke="#e05050" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Ring wire -->
  <line x1="215" y1="502" x2="310" y2="502" stroke="#e09020" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- sleeve wire -->
  <line x1="215" y1="530" x2="310" y2="530" stroke="#a0a0a0" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Bridge Ring to Tip note -->
  <line x1="310" y1="474" x2="350" y2="474" stroke="#e05050" stroke-width="2"/>
  <line x1="310" y1="502" x2="350" y2="502" stroke="#e09020" stroke-width="2"/>
  <!-- Bridge line Ring->Tip -->
  <line x1="350" y1="474" x2="350" y2="502" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="355" y="492" fill="#ffff00" font-size="9">bridge</text>
  <!-- join to single line -->
  <line x1="350" y1="474" x2="395" y2="474" stroke="#e05050" stroke-width="2"/>
  <line x1="350" y1="502" x2="395" y2="488" stroke="#e09020" stroke-width="1.5"/>
  <line x1="395" y1="474" x2="395" y2="488" stroke="#e05050" stroke-width="1.5"/>
  <line x1="395" y1="488" x2="420" y2="488" stroke="#e05050" stroke-width="2"/>

  <line x1="310" y1="530" x2="420" y2="530" stroke="#a0a0a0" stroke-width="2"/>

  <!-- N3 Connector -->
  <rect x="420" y="435" width="165" height="145" rx="6" fill="#1a1a3a" stroke="#9c88ff" stroke-width="1.5"/>
  <text x="502" y="453" fill="#9c88ff" font-size="11" font-weight="bold" text-anchor="middle">Canon N3 Stecker</text>

  <!-- N3 visual pins -->
  <rect x="445" y="462" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>
  <rect x="445" y="490" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>
  <rect x="445" y="518" width="110" height="24" rx="4" fill="#9c88ff" opacity="0.15" stroke="#9c88ff" stroke-width="1"/>

  <circle cx="450" cy="474" r="5" fill="#e05050"/>
  <circle cx="450" cy="502" r="5" fill="#e05050"/>
  <circle cx="450" cy="530" r="5" fill="#a0a0a0"/>

  <text x="462" y="478" fill="#e0e0e0" font-size="11">Tip    Shutter</text>
  <text x="462" y="506" fill="#e0e0e0" font-size="11">Ring   Focus (AF)</text>
  <text x="462" y="534" fill="#e0e0e0" font-size="11">Sleeve GND</text>

  <!-- N3 note -->
  <text x="502" y="562" fill="#9e9e9e" font-size="9" text-anchor="middle">Canon EOS 1D/5D/6D/7D/R-Serie</text>

  <!-- Cable note box -->
  <rect x="600" y="435" width="155" height="145" rx="6" fill="#0d1117" stroke="#4a90d9" stroke-width="1"/>
  <text x="677" y="453" fill="#a0c4ff" font-size="10" font-weight="bold" text-anchor="middle">Hinweise</text>
  <text x="610" y="472" fill="#9e9e9e" font-size="9">Ring + Tip gebrückt:</text>
  <text x="610" y="485" fill="#9e9e9e" font-size="9">AF + Shutter gleichzeitig</text>
  <text x="610" y="500" fill="#9e9e9e" font-size="9">Nur Tip verdrahtet:</text>
  <text x="610" y="513" fill="#9e9e9e" font-size="9">Shutter ohne AF</text>
  <text x="610" y="530" fill="#9e9e9e" font-size="9">N3 = 2.5mm Sub-D</text>
  <text x="610" y="543" fill="#9e9e9e" font-size="9">3-polig proprietary</text>
  <text x="610" y="560" fill="#ffff00" font-size="9">Kabel: geschirmt</text>
  <text x="610" y="573" fill="#ffff00" font-size="9">empfohlen</text>

</svg>
